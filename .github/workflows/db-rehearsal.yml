name: Database Rehearsal Workflow

on:
  workflow_dispatch:

concurrency:
  group: db-rehearsal
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rehearsal:
    environment: pachilog_secret
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Full Database Rehearsal
        run: |
          bun run --cwd packages/web db:rehearsal
