name: Collect PachiLog data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [.github/workflows/collect-data.yml]
  schedule:
    # Every day at 10:15 JST. GitHub Actions cron is expressed in UTC.
    - cron: "15 1 * * *"

concurrency:
  group: pachilog-data-collection
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      COLLECT_SECRET_TOKEN: ${{ secrets.COLLECT_SECRET_TOKEN }}
      PORT: "3000"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Validate required secrets
        shell: bash
        run: |
          for name in DATABASE_URL DATABASE_AUTH_TOKEN YOUTUBE_API_KEY COLLECT_SECRET_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Actions secret: ${name}" >&2
              exit 1
            fi
          done
      - run: bun install --frozen-lockfile
      - name: Initialize database
        run: |
          bun run --cwd packages/web db:push
          bun packages/web/src/api/data/seed.ts
          bun packages/web/src/api/data/seed-machines-run.ts
      - name: Start API and collect today's data
        shell: bash
        run: |
          cd packages/web
          bun src/server.ts > /tmp/pachilog-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat /tmp/pachilog-server.log >&2
              exit 1
            fi
            sleep 1
          done

          channel_result=$(curl --fail-with-body --silent --show-error \
            -X POST \
            -H "x-collect-secret: ${COLLECT_SECRET_TOKEN}" \
            http://127.0.0.1:3000/api/collect/run)
          echo "Channel collection: ${channel_result}"
          CHANNEL_RESULT="${channel_result}" bun -e '
            const result = JSON.parse(process.env.CHANNEL_RESULT ?? "{}");
            if (result.channelsRequested < 1 || result.channelsFetched !== result.channelsRequested) {
              console.error("Channel collection was incomplete.");
              process.exit(1);
            }
          '

          machine_result=$(curl --fail-with-body --silent --show-error \
            -X POST \
            -H "x-collect-secret: ${COLLECT_SECRET_TOKEN}" \
            http://127.0.0.1:3000/api/collect-machines/run)
          echo "Machine collection: ${machine_result}"
          MACHINE_RESULT="${machine_result}" bun -e '
            const result = JSON.parse(process.env.MACHINE_RESULT ?? "{}");
            if (result.channelsScanned < 1 || result.errors?.length > 0) {
              console.error("Machine collection was incomplete.");
              process.exit(1);
            }
          '
