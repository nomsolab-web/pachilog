name: Collect PachiLog data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [.github/workflows/collect-data.yml]
  schedule:
    # Every day at 10:15 JST. GitHub Actions cron is expressed in UTC.
    - cron: "15 1 * * *"

concurrency:
  group: pachilog-data-collection
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    environment: pachilog_secret
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      COLLECT_SECRET_TOKEN: ${{ secrets.COLLECT_SECRET_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PORT: "3000"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Validate required secrets
        shell: bash
        run: |
          for name in DATABASE_URL DATABASE_AUTH_TOKEN YOUTUBE_API_KEY COLLECT_SECRET_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Actions secret: ${name}" >&2
              exit 1
            fi
          done
      - run: bun install --frozen-lockfile
      - name: Initialize database
        run: |
          bun run --cwd packages/web db:migrate
          bun packages/web/src/api/data/seed.ts
          bun packages/web/src/api/data/seed-machines-run.ts
      - name: Start API and collect today's data
        shell: bash
        run: |
          cd packages/web
          bun src/server.ts > /tmp/pachilog-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat /tmp/pachilog-server.log >&2
              exit 1
            fi
            sleep 1
          done

          post_collect() {
            local url="$1"
            local body
            if ! body=$(curl --fail-with-body --silent --show-error \
              -X POST \
              -H "x-collect-secret: ${COLLECT_SECRET_TOKEN}" \
              "$url"); then
              echo "::group::pachilog server log"
              cat /tmp/pachilog-server.log >&2 || true
              echo "::endgroup::"
              return 1
            fi
            printf '%s' "$body"
          }

          channel_result=$(post_collect http://127.0.0.1:3000/api/collect/run)
          echo "Channel collection: ${channel_result}"
          CHANNEL_RESULT="${channel_result}" bun -e '
            const result = JSON.parse(process.env.CHANNEL_RESULT ?? "{}");
            const requested = result.channelsRequested ?? 0;
            const fetched = result.channelsFetched ?? 0;
            if (requested < 1 || fetched / requested < 0.95) {
              console.error("Channel collection was incomplete.", result.errors ?? []);
              process.exit(1);
            }
          '

          machine_result=$(post_collect http://127.0.0.1:3000/api/collect-machines/run)
          echo "Machine collection: ${machine_result}"
          MACHINE_RESULT="${machine_result}" bun -e '
            const result = JSON.parse(process.env.MACHINE_RESULT ?? "{}");
            const requested = result.channelsRequested ?? 0;
            const failed = result.failedChannels ?? 0;
            if (requested < 1 || (requested - failed) / requested < 0.95) {
              console.error("Machine collection was incomplete.", result.errors ?? []);
              process.exit(1);
            }
          '
