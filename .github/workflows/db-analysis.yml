name: Database Unmatched Analysis

on:
  workflow_dispatch:

concurrency:
  group: db-unmatched-analysis
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    environment: pachilog_secret
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Validate required secrets
        shell: bash
        run: |
          for name in DATABASE_URL DATABASE_AUTH_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Actions secret: ${name}" >&2
              exit 1
            fi
          done
      - run: bun install --frozen-lockfile
      - name: Run Read-only Analysis
        run: |
          bun run --cwd packages/web db:analyze
